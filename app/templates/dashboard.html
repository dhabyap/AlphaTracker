<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlphaTracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --border2: #252535;
    --orange: #f7931a;
    --orange-dim: rgba(247,147,26,0.12);
    --green: #00d26a;
    --green-dim: rgba(0,210,106,0.1);
    --red: #ff3b5c;
    --red-dim: rgba(255,59,92,0.1);
    --yellow: #ffd60a;
    --yellow-dim: rgba(255,214,10,0.1);
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.1);
    --purple: #a78bfa;
    --muted: #4a4a6a;
    --text: #e8e8f0;
    --text2: #9090b0;
    --text3: #5a5a7a;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--orange); }
  .logo-icon { font-size: 20px; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* Alert bell */
  .alert-bell {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 18px;
    padding: 4px 8px;
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
  }
  .alert-bell:hover { border-color: var(--orange); }
  .alert-badge {
    position: absolute;
    top: -4px; right: -4px;
    background: var(--red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }

  .alert-panel {
    display: none;
    position: fixed;
    top: 56px; right: 24px;
    width: 360px;
    max-height: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 200;
    overflow: hidden;
  }
  .alert-panel.open { display: block; }

  .alert-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    font-size: 13px;
  }
  .alert-close {
    background: transparent;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
  }
  .alert-close:hover { color: var(--red); }

  .alert-list {
    max-height: 340px;
    overflow-y: auto;
    padding: 8px;
  }

  .alert-item {
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    font-size: 12px;
    line-height: 1.4;
  }
  .alert-item.pump { border-left: 3px solid var(--green); }
  .alert-item.dump { border-left: 3px solid var(--red); }
  .alert-item.score_drop { border-left: 3px solid var(--yellow); }
  .alert-item.new_token { border-left: 3px solid var(--blue); }
  .alert-item .alert-time {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--orange); }
  .logo-icon { font-size: 20px; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* Alert bell */
  .alert-bell {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 18px;
    padding: 4px 8px;
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
  }
  .alert-bell:hover { border-color: var(--orange); }
  .alert-badge {
    position: absolute;
    top: -4px; right: -4px;
    background: var(--red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }

  .alert-panel {
    display: none;
    position: fixed;
    top: 56px; right: 24px;
    width: 360px;
    max-height: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 200;
    overflow: hidden;
  }
  .alert-panel.open { display: block; }

  .alert-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    font-size: 13px;
  }
  .alert-close {
    background: transparent;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
  }
  .alert-close:hover { color: var(--red); }

  .alert-list {
    max-height: 340px;
    overflow-y: auto;
    padding: 8px;
  }

  .alert-item {
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    font-size: 12px;
    line-height: 1.4;
  }
  .alert-item.pump { border-left: 3px solid var(--green); }
  .alert-item.dump { border-left: 3px solid var(--red); }
  .alert-item.score_drop { border-left: 3px solid var(--yellow); }
  .alert-item.new_token { border-left: 3px solid var(--blue); }
  .alert-item .alert-time {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
  }

  .last-refresh {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
  }

  .btn-refresh {
    background: var(--orange-dim);
    border: 1px solid var(--orange);
    color: var(--orange);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .btn-refresh:hover { background: rgba(247,147,26,0.2); }
  .btn-refresh:disabled { opacity: 0.4; cursor: wait; }

  .btn-small {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-small:hover { background: var(--border); color: var(--text); }
  .btn-small:disabled { opacity: 0.4; cursor: wait; }

  /* ── MAIN ── */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  /* ── STAT CARDS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-card.tracked::before { background: var(--blue); }
  .stat-card.strong-buy::before { background: var(--green); }
  .stat-card.monitor::before { background: var(--yellow); }
  .stat-card.avoid::before { background: var(--red); }
  .stat-card.portfolio::before { background: var(--orange); }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 8px;
  }

  .stat-val {
    font-size: 28px;
    font-weight: 700;
    font-family: var(--mono);
    line-height: 1;
  }
  .stat-card.tracked .stat-val { color: var(--blue); }
  .stat-card.strong-buy .stat-val { color: var(--green); }
  .stat-card.monitor .stat-val { color: var(--yellow); }
  .stat-card.avoid .stat-val { color: var(--red); }
  .stat-card.portfolio .stat-val { color: var(--orange); }

  .stat-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
    font-family: var(--mono);
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 240px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--orange); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 15px;
  }

  .btn-track {
    background: var(--orange);
    color: #000;
    border: none;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn-track:hover { opacity: 0.88; }

  /* ── FILTER TABS ── */
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    width: 44px;
    flex-shrink: 0;
  }

  .tab-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tab {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .tab:hover { border-color: var(--text3); color: var(--text); }
  .tab.active {
    background: var(--orange);
    border-color: var(--orange);
    color: #000;
    font-weight: 700;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  /* ── RESULT INFO ── */
  .result-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .result-count {
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* ── TOKEN GRID ── */
  .token-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
    gap: 14px;
  }

  .token-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .token-card:hover {
    border-color: var(--border2);
    transform: translateY(-1px);
  }
  .token-card.score-high { border-left: 3px solid var(--green); }
  .token-card.score-mid { border-left: 3px solid var(--yellow); }
  .token-card.score-low { border-left: 3px solid var(--red); }

  /* Card top bar */
  .card-top {
    padding: 14px 16px 10px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .token-identity {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .token-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--orange);
    flex-shrink: 0;
    font-family: var(--mono);
  }

  .token-name-wrap { min-width: 0; }
  .token-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .token-chain {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 4px;
    margin-top: 3px;
  }

  .external-links {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .link-icon {
    font-size: 13px;
    text-decoration: none;
    opacity: 0.6;
    transition: opacity 0.15s;
    cursor: pointer;
  }
  .link-icon:hover { opacity: 1; }

  /* Sparkline */
  .sparkline-wrap {
    margin-top: 6px;
    position: relative;
  }
  .sparkline-canvas {
    width: 100px;
    height: 28px;
    display: block;
  }

  .token-right { text-align: right; flex-shrink: 0; }

  .price-main {
    font-size: 18px;
    font-family: var(--mono);
    font-weight: 600;
    color: var(--text);
  }

  .price-change {
    font-size: 12px;
    font-family: var(--mono);
    font-weight: 500;
    margin-top: 2px;
  }
  .price-change.up { color: var(--green); }
  .price-change.down { color: var(--red); }

  /* Tags */
  .tags {
    padding: 0 16px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tag-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,210,106,0.2); }
  .tag-yellow { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(255,214,10,0.2); }
  .tag-blue { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(79,142,247,0.2); }
  .tag-purple { background: rgba(167,139,250,0.1); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
  .tag-orange { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(247,147,26,0.2); }
  .tag-red { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,59,92,0.2); }
  .tag-muted { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

  /* Main stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat-cell {
    background: var(--surface);
    padding: 10px 14px;
    text-align: center;
  }

  .stat-cell-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text3);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .stat-cell-val {
    font-size: 13px;
    font-family: var(--mono);
    font-weight: 600;
    color: var(--text);
  }

  .stat-cell-val.green { color: var(--green); }
  .stat-cell-val.red { color: var(--red); }
  .stat-cell-val.orange { color: var(--orange); }

  /* Supply row */
  .supply-row {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .supply-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .supply-item-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .supply-item-val {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text2);
    font-weight: 600;
  }

  /* Caution */
  .caution-row {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,59,92,0.04);
  }

  .caution-icon { font-size: 13px; }

  .caution-text {
    font-size: 11px;
    color: var(--red);
    font-weight: 500;
    flex: 1;
  }

  /* Card bottom */
  .card-bottom {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .action-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.02em;
  }
  .action-strong { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,210,106,0.3); }
  .action-watch { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(79,142,247,0.3); }
  .action-avoid { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,59,92,0.3); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .meta-item {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .meta-item span { color: var(--text2); }

  /* Expand toggle */
  .expand-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .expand-btn:hover { border-color: var(--orange); color: var(--orange); }

  /* Expanded section */
  .expanded-section {
    display: none;
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    background: var(--surface2);
  }
  .expanded-section.open { display: block; }

  .expanded-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 10px;
  }

  .exp-item-label {
    font-size: 9px;
    text-transform: uppercase;
    color: var(--text3);
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }
  .exp-item-val {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text);
    font-weight: 600;
  }

  .contract-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--surface);
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .contract-label {
    font-size: 9px;
    text-transform: uppercase;
    color: var(--text3);
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .contract-addr {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--blue);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .copy-btn {
    background: transparent;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 4px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .copy-btn:hover { color: var(--orange); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 80px 20px;

<script>
// ── STATE ──────────────────────────────────────────────────────────────────────
let tokens = [];
let sortMode = 'score';
let chainFilter = 'all';

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n === null || n === undefined || n === 0) return '—';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  if (n < 0.01) return '$' + n.toFixed(6);
  return '$' + n.toLocaleString(undefined, {maximumFractionDigits: 2});
}

function fmtNum(n) {
  if (n === null || n === undefined) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}

function fmtPrice(p) {
  if (!p) return '—';
  if (p < 0.0001) return p.toFixed(8);
  if (p < 0.01) return p.toFixed(6);
  if (p < 1) return p.toFixed(6);
  return p.toFixed(4);
}

function fmtSupply(val, sym) {
  if (!val) return '—';
  const num = parseFloat(val);
  if (isNaN(num)) return val;
  let s = '';
  if (num >= 1e9) s = (num/1e9).toFixed(1) + 'B';
  else if (num >= 1e6) s = (num/1e6).toFixed(1) + 'M';
  else if (num >= 1e3) s = (num/1e3).toFixed(1) + 'K';
  else s = num.toLocaleString();
  return sym ? s + ' ' + sym : s;
}

function scoreColor(s) {
  if (s >= 70) return 'score-green';
  if (s >= 50) return 'score-yellow';
  return 'score-red';
}

function cardClass(s) {
  if (s >= 70) return 'score-high';
  if (s >= 50) return 'score-mid';
  return 'score-low';
}

function actionClass(a) {
  if (a && a.includes('Strong Buy')) return 'action-strong';
  if (a && a.includes('Watch')) return 'action-watch';
  return 'action-avoid';
}

function tagClass(t) {
  const map = {
    'high liquidity': 'tag-green',
    'active trading': 'tag-blue',
    'new token': 'tag-purple',
    'pumping': 'tag-orange',
    'mature': 'tag-muted',
    'multiple markets': 'tag-muted',
    'slight buying': 'tag-muted',
    'adequate liquidity': 'tag-yellow',
    'medium liquidity': 'tag-yellow',
    'heavy dump': 'tag-red',
    'low liquidity': 'tag-red',
    'mooning': 'tag-orange',
    'accumulation': 'tag-green',
  };
  const lower = t.toLowerCase();
  for (const [k, v] of Object.entries(map)) {
    if (lower.includes(k)) return v;
  }
  return 'tag-muted';
}

function initials(sym) {
  return sym ? sym.slice(0, 2).toUpperCase() : '??';
}

function parseAnalysis(token) {
  let a = {};
  if (token.latest_analysis) {
    if (typeof token.latest_analysis === 'string') {
      try { a = JSON.parse(token.latest_analysis); } catch(e) {}
    } else {
      a = token.latest_analysis;
    }
  }
  const m = a.metrics || {};
  const score = token.latest_score || a.score || 0;
  const signals = a.signals || [];

  return {
    score,
    rec_label: a.rec_label || (score >= 70 ? 'Strong Buy & Hold' : score >= 50 ? 'Buy & Watch' : 'Avoid'),
    action: a.recommendation || (score >= 70 ? 'strong_buy' : score >= 50 ? 'buy' : 'avoid'),
    signals,
    metrics: m,
    tags: signals.map(s => s.label || ''),
    caution: null
  };
}

function calcAge(createdAt, ageDays) {
  // Use age_days if available
  if (ageDays != null) {
    if (ageDays < 1) return (ageDays * 24).toFixed(1) + 'h';
    return ageDays.toFixed(1) + 'd';
  }
  // Fallback to created_at timestamp
  if (createdAt) {
    const diff = (Date.now() - new Date(createdAt).getTime()) / 86400000;
    if (diff < 1) return (diff * 24).toFixed(1) + 'h';
    return diff.toFixed(1) + 'd';
  }
  return '—';
}

function parseNotes(token) {
  if (!token.notes) return null;
  let n = {};
  if (typeof token.notes === 'string') {
    try { n = JSON.parse(token.notes); } catch(e) { return null; }
  } else {
    n = token.notes;
  }
  const cautionStr = n.caution || n.warning || n.note || null;
  return cautionStr;
}

async function loadTokens() {
  try {
    document.getElementById('tokenGrid').innerHTML =
      '<div class="loading-card"><div class="shimmer shimmer-line"></div><div class="shimmer shimmer-line short"></div><div class="shimmer shimmer-line long"></div></div>'.repeat(3);
    document.getElementById('resultCount').textContent = 'Loading…';

    const r = await fetch('/api/tokens?limit=200');
    const data = await r.json();
    tokens = (data.tokens || []).map(t => {
      const a = parseAnalysis(t);
      const m = a.metrics;
      return {
        id: t.id || t.contract,
        symbol: t.symbol || '?',
        contract: t.contract,
        chain: t.chain || 'bsc',
        price: m.price_usd,
        change24h: m.price_change_24h || 0,
        score: a.score,
        liquidity: m.liquidity_usd,
        volume24h: m.volume_24h || 0,
        mcap: m.market_cap,
        fdv: m.fdv,
        holders: null,
        transactions24h: (m.txns_buy || 0) + (m.txns_sell || 0),
        high24h: m.price_usd ? m.price_usd * (1 + Math.abs((m.price_change_24h || 5)) / 200) : null,
        low24h: m.price_usd ? m.price_usd * (1 - Math.abs((m.price_change_24h || 5)) / 200) : null,
        circSupply: fmtSupply(m.circ_supply, t.symbol),
        totalSupply: fmtSupply(m.total_supply, t.symbol),
        age: calcAge(t.created_at, m.age_days),
        markets: m.markets || 1,
        tags: a.tags,
        action: a.rec_label,
        caution: parseNotes(t),
        addedAt: t.created_at ? new Date(t.created_at).getTime() : Date.now(),
        buy_sell_ratio: m.buy_sell_ratio,
        vol_mc_ratio: m.vol_mc_ratio,
        float_pct: m.float_pct,
        buy_price: t.buy_price || 0,
        buy_amount: t.buy_amount || 0,
        buy_date: t.buy_date || '',
      };
    });
    renderCards();
    updateRefreshTime();
    loadSparklines();
  } catch(e) {
    document.getElementById('tokenGrid').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Failed to load: ${e.message}</div></div>`;
    document.getElementById('resultCount').textContent = 'Error loading';
    showToast('Error loading tokens', 'error');
  }
}

async function refreshAll() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  btn.textContent = '⟳ Refreshing…';
  showToast('Refreshing all tokens…', 'loading');
  try {
    const r = await fetch('/api/refresh-all', { method: 'POST' });
    const data = await r.json();
    showToast(`✓ ${data.refreshed} tokens refreshed${data.alerts ? ', ' + data.alerts + ' alerts' : ''}`, 'success');
    await loadTokens();
  } catch(e) {
    showToast('✗ Refresh failed: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = '⟳ Refresh';
}

async function addToken() {
  const contract = document.getElementById('inputContract').value.trim();
  const symbol = document.getElementById('inputSymbol').value.trim().toUpperCase();
  const chain = document.getElementById('inputChain').value;

  if (!contract) { showToast('Enter contract address', 'error'); return; }

  const btn = document.getElementById('btnTrack');
  btn.disabled = true;
  btn.textContent = 'Tracking…';

  try {
    let url = `/api/track/${encodeURIComponent(contract)}?chain=${chain}`;
    if (symbol) url += `&symbol=${encodeURIComponent(symbol)}`;

    const r = await fetch(url, { method: 'POST' });
    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.detail || 'Track failed');
    }
    showToast(`✓ ${symbol || contract.slice(0,10)} tracked`, 'success');
    closeModal();
    await loadTokens();
  } catch(e) {
    showToast('✗ ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = '＋ Add Token';
}

async function removeToken(contract) {
  if (!confirm('Remove this token?')) return;
  try {
    const r = await fetch(`/api/tokens/${encodeURIComponent(contract)}`, { method: 'DELETE' });
    if (!r.ok) throw new Error('Remove failed');
    showToast('✓ Token removed', 'success');
    await loadTokens();
  } catch(e) {
    showToast('✗ ' + e.message, 'error');
  }
}

  let list = [...tokens];

function getVerdictLabel(v) {
  const map = {
    'strong_buy': 'Strong Buy',
    'buy': 'Buy & Watch',
    'hold': 'Hold',
    'avoid': 'Avoid',
    'strong_sell': 'Strong Sell',
  };
  return map[v] || v || 'Unknown';
}

function getVerdictEmoji(v) {
  const map = {
    'strong_buy': '🚀',
    'buy': '📈',
    'hold': '⏳',
    'avoid': '⚠️',
    'strong_sell': '🔻',
  };
  return map[v] || '❓';
}

function getVerdictClass(v) {
  return 'v-' + (v || 'unknown').toLowerCase().replace(/ /g, '_');
}

function fmtTokenPrice(p) {
  if (!p) return '—';
  if (p < 0.0001) return '$' + p.toFixed(8);
  if (p < 0.01) return '$' + p.toFixed(6);
  if (p < 1) return '$' + p.toFixed(6);
  return '$' + p.toFixed(4);
}

function fmtBigNum(n) {
  if (n === null || n === undefined) return '—';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  if (n < 0.01) return '$' + n.toFixed(6);
  return '$' + n.toLocaleString(undefined, {maximumFractionDigits: 2});
}

function signalIcon(type) {
  const map = {
    'safe': '✅',
    'info': '📊',
    'hot': '🔥',
    'bullish': '📈',
    'bearish': '📉',
    'risk': '⚠️',
    'warning': '⚡',
  };
  return map[type] || '📌';
}

async function fetchAIAnalysis(contract, symbol, force) {
  const aiContent = document.getElementById('aiContent');
  const aiLoading = document.getElementById('aiLoading');

  // Force refresh — clear cache for this contract
  if (force) delete window.aiCache[contract];

  const forceParam = force ? '&force=1' : '';
  try {
    const r = await fetch(`/api/ai-advisor?contract=${encodeURIComponent(contract)}${forceParam}`);
    if (!r.ok) throw new Error('API returned ' + r.status);
    const data = await r.json();

    // Cache it
    window.aiCache[contract] = { data, timestamp: Date.now() };

    aiLoading.style.display = 'none';
    aiContent.style.display = 'block';
    aiContent.innerHTML = renderAIContent(data, symbol);
  } catch(e) {
    aiLoading.style.display = 'none';
    aiContent.style.display = 'block';
    aiContent.innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">Gagal mengambil analisis AI: ${e.message}</div>
        <button class="ai-refresh-btn" onclick="fetchAIAnalysis('${contract}','${symbol||''}', true)" style="margin-top:16px">⟳ Coba Lagi</button>
      </div>`;
  }
}

function drawSparkline(canvasId, prices, isUp) {
  const c = document.getElementById(canvasId);
  if (!c || !prices || prices.length < 2) return;
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const range = max - min || 1;
  const color = isUp ? '#00d26a' : '#ff3b5c';

  ctx.clearRect(0, 0, w, h);
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';

  for (let i = 0; i < prices.length; i++) {
    const x = (i / (prices.length - 1)) * w;
    const y = h - ((prices[i] - min) / range) * (h - 8) - 4;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, isUp ? 'rgba(0,210,106,0.15)' : 'rgba(255,59,92,0.15)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
}

function loadSparklines() {
  tokens.forEach(t => {
    fetch('/api/sparkline/' + encodeURIComponent(t.contract) + '?limit=20')
      .then(r => r.json())
      .then(data => {
        if (data.prices && data.prices.length >= 2) {
          const isUp = data.prices[data.prices.length - 1] >= data.prices[0];
          drawSparkline('spark-' + t.id, data.prices, isUp);
        }
      })
      .catch(() => {});
  });
}

// ── Helper: time ago ──────────────────────────────────────────────────────────
function timeAgo(ts) {
  if (!ts) return '—';
  const sec = Math.floor((Date.now()/1000 - ts));
  if (sec < 60) return 'baru saja';
  if (sec < 3600) return `${Math.floor(sec/60)}m lalu`;
  if (sec < 86400) return `${Math.floor(sec/3600)}j lalu`;
  return `${Math.floor(sec/86400)}h lalu`;
}

    const alerts = data.alerts || [];
    const listEl = document.getElementById('alertList');
    const badge = document.getElementById('alertCount');
    if (!alerts.length) {
      listEl.innerHTML = '<div class="empty-text">Belum ada notifikasi</div>';
      badge.style.display = 'none';
      return;
    }
    badge.textContent = alerts.length;
    badge.style.display = 'flex';
    listEl.innerHTML = alerts.map(a => {
      const typeClass = a.type || 'info';
      const emoji = typeClass === 'pump' ? '🔥' : typeClass === 'dump' ? '💀' : a.message.includes('Whale') ? '🐋' : '📢';
      const time = new Date(a.timestamp * 1000).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
      const cleanMsg = a.message.replace(/\*+/g, '').replace(/\\n/g, '\n');
      const short = cleanMsg.length > 60 ? cleanMsg.substring(0,60)+'…' : cleanMsg;
      return `<div class="alert-item ${typeClass}" style="cursor:pointer" onclick="showAlertDetail('${emoji}','${cleanMsg.replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/\n/g,'\\n')}','${a.timestamp}')">
        <span class="alert-time">${emoji} ${time}</span><br>
        <span style="font-size:11px">${short}</span>
        ${cleanMsg.length > 60 ? '<span style="font-size:10px;color:var(--text3)"> ⋯ tap untuk detail</span>' : ''}
      </div>`;
    }).join('');
  } catch(e) { console.error('Alerts:', e); }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadTokens();
updateRefreshTime();
loadAlerts();
</script>
